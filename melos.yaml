name: flutter_architecture
packages:
  - apps/*
  - packages/*
  - packages/modules/*

scripts:
  bootstrap: melos bootstrap
  analyze: melos exec -- flutter analyze
  test: melos exec -- flutter test
  format: melos exec -- dart format .
  gen: ./tooling/run_codegen.sh
  scaffold:app: ./tooling/create_app_shell.sh
  scaffold:module: ./tooling/create_module.sh
  repair:ide: ./tooling/repair_flutter_ide.sh
  contract:check: ./tooling/check_contract_compatibility.sh
  contract:update-lock: ./tooling/update_contract_lock.sh
  ci: melos run bootstrap && melos run contract:check && melos run analyze && melos run test
