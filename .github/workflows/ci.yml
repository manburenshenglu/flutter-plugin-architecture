name: Flutter Monorepo CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart
        run: dart --version

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Contract compatibility check
        run: ./tooling/check_contract_compatibility.sh

      - name: Analyze
        run: melos exec -- flutter analyze

      - name: Test
        run: melos exec -- flutter test
